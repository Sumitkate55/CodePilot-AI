services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: codepilot
      POSTGRES_USER: codepilot
      POSTGRES_PASSWORD: codepilot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codepilot -d codepilot"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.13.6
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: ./apps/api
    command: >
      sh -c "alembic upgrade head && uvicorn --app-dir src codepilot_api.main:app --host 0.0.0.0 --port 8000"
    environment:
      APP_ENV: development
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://codepilot:codepilot@postgres:5432/codepilot
      CORS_ORIGINS: '["http://localhost:5173"]'
      # Production deployments must override this with their exact API hostname.
      TRUSTED_HOSTS: '["localhost","127.0.0.1"]'
      JWT_SECRET_KEY: change-this-demo-secret-before-public-deployment-2026
      AI_PROVIDER: ollama
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_CHAT_MODEL: qwen2.5-coder:3b
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      QDRANT_URL: http://qdrant:6333
      REPOSITORY_STORAGE_ROOT: /app/data/repositories
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - repository_data:/app/data/repositories

  web:
    build:
      context: ./apps/web
      args:
        # Same-origin API calls work locally and through a single public demo URL.
        VITE_API_BASE_URL: /api/v1
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  postgres_data:
  qdrant_data:
  repository_data:
